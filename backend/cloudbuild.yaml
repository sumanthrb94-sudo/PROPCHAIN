# Cloud Build manifest for PropChain Backend (Cloud Run)
steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/propchain-backend', '.']

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/propchain-backend']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'propchain-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/propchain-backend'
      - '--region'
      - 'us-central1' # Replace with your preferred region
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,PORT=3001'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:us-central1:propchain-db' # Replace with your Cloud SQL instance connection name

images:
  - 'gcr.io/$PROJECT_ID/propchain-backend'
