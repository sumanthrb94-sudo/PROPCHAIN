# GCP Cloud Build — triggered by push to main (backend changes)
# Alternative to GitHub Actions for fully GCP-native deployments.
# Connect via: Cloud Build → Triggers → Connect Repository → GitHub

steps:
  # ── 1. Install & generate Prisma client ────────────────────────────────────
  - name: node:20-alpine
    id: prisma-generate
    dir: backend
    entrypoint: sh
    args:
      - -c
      - |
        npm ci --ignore-scripts
        npx prisma generate

  # ── 2. Build Docker image and push to Artifact Registry ──────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-push
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:latest
      - -f
      - backend/Dockerfile
      - backend

  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:latest

  # ── 3. Run Prisma migrations via Cloud Run Job ────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: migrate
    entrypoint: gcloud
    args:
      - run
      - jobs
      - create
      - propchain-migrate-$BUILD_ID
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:$COMMIT_SHA
      - --region=${_REGION}
      - --set-secrets=DATABASE_URL=propchain-database-url:latest
      - --command=npx
      - --args=prisma,migrate,deploy
      - --max-retries=0
      - --execute-now
      - --wait

  # ── 4. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - propchain-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --timeout=30
      - --concurrency=80
      - --port=8080
      - --set-env-vars=NODE_ENV=production,FRONTEND_URL=${_FRONTEND_URL},THROTTLE_TTL=60,THROTTLE_LIMIT=30
      - --set-secrets=JWT_SECRET=propchain-jwt-secret:latest,DATABASE_URL=propchain-database-url:latest,FIREBASE_PROJECT_ID=propchain-firebase-project-id:latest,FIREBASE_CLIENT_EMAIL=propchain-firebase-client-email:latest,FIREBASE_PRIVATE_KEY=propchain-firebase-private-key:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/propchain/api:latest

# Build substitution variables (override in Cloud Build trigger settings)
substitutions:
  _REGION: europe-west1
  _FRONTEND_URL: https://propchain.ae

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamicSubstitutions: true

timeout: 1200s
