name: Deploy Backend → GCP Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}           # e.g. europe-west1 or us-central1
  SERVICE_NAME: propchain-api
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/propchain/api

jobs:
  deploy:
    name: Build + Push + Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # ── Auth via Workload Identity Federation (keyless — recommended) ──────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Configure Docker for Artifact Registry ────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Build & push image ────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Run Prisma migrations before traffic switches ─────────────────────
      - name: Run database migrations
        run: |
          gcloud run jobs create propchain-migrate-${{ github.run_number }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --command="npx" \
            --args="prisma,migrate,deploy" \
            --max-retries=0 \
            --execute-now \
            --wait
        continue-on-error: false

      # ── Deploy new revision to Cloud Run ──────────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            FRONTEND_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            THROTTLE_TTL=60
            THROTTLE_LIMIT=30
          secrets: |
            JWT_SECRET=propchain-jwt-secret:latest
            DATABASE_URL=propchain-database-url:latest
            FIREBASE_PROJECT_ID=propchain-firebase-project-id:latest
            FIREBASE_CLIENT_EMAIL=propchain-firebase-client-email:latest
            FIREBASE_PRIVATE_KEY=propchain-firebase-private-key:latest
          flags: |
            --platform=managed
            --allow-unauthenticated
            --min-instances=1
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --timeout=30
            --concurrency=80
            --port=8080

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

# ─── Required GitHub Secrets ─────────────────────────────────────────────────
# GCP_PROJECT_ID                   → Your GCP project ID (e.g. propchain-prod)
# GCP_REGION                       → GCP region (e.g. europe-west1)
# GCP_WORKLOAD_IDENTITY_PROVIDER   → projects/NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
# GCP_SERVICE_ACCOUNT              → github-deploy@propchain-prod.iam.gserviceaccount.com
# DATABASE_URL                     → postgresql://... (GCP Cloud SQL connection string)
# NEXT_PUBLIC_SITE_URL             → https://propchain.ae
#
# ─── Required GCP Secret Manager secrets ─────────────────────────────────────
# propchain-jwt-secret             → 64-byte random hex
# propchain-database-url           → PostgreSQL connection string
# propchain-firebase-project-id    → Firebase project ID
# propchain-firebase-client-email  → Firebase admin SDK client email
# propchain-firebase-private-key   → Firebase admin SDK private key
